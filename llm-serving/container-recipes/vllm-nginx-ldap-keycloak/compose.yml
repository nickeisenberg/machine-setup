services:
  auth:
    image: localhost/auth-fips:latest   # <-- Point to your pre-built local image
    container_name: auth
    networks:
      - llm-net
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    command:
      - start-dev
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME}
      KC_HOSTNAME_PORT: ${KC_HOSTNAME_PORT}
      KC_HTTP_ENABLED: "true"
    ports:
      - "${KC_HOSTNAME_PORT}:8080"
    volumes:
      - ./mnt/keycloak/data:/opt/keycloak/data:Z,U
    networks:
      - llm-net
    restart: unless-stopped

  vllm:
    image: localhost/vllm-openai-fips
    container_name: vllm
    command:
      - /models/${LLM_MODEL_NAME}
      - --served-model-name
      - ${LLM_MODEL_NAME}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "10000"
    ipc: host
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities:
                - gpu
    security_opt:
      - label=disable
    volumes:
      - ${LLM_WEIGHTS_DIR}:/models:Z
    networks:
      - llm-net
    restart: unless-stopped

  nginx:
    image: docker.io/library/nginx:latest
    container_name: nginx

    ports:
      - "${NGINX_PORT}:8001"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./nginx/certs:/etc/nginx/certs:ro,Z

    depends_on:
      - vllm

    networks:
      - llm-net

    restart: unless-stopped

  ldap:
    image: docker.io/osixia/openldap:latest
    container_name: ldap

    environment:
      LDAP_ORGANISATION: "MSTS"
      LDAP_DOMAIN: "nv.doe.gov"
      LDAP_ADMIN_PASSWORD: ${LDAP_ADMIN_PASSWORD} 

    ports:
      - "${LDAP_PORT}:389"

    volumes:
      - ./mnt/ldap/data:/var/lib/ldap:Z
      - ./mnt/ldap/config:/etc/ldap/slapd.d:Z

    networks:
      - llm-net

    restart: unless-stopped

networks:
  llm-net:
