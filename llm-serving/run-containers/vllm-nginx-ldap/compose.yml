services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak

    command:
      - start-dev 

    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: adminpassword

    ports:
      - "8081:8080"

    volumes:
      - ./keycloak-data:/opt/keycloak/data:Z

    networks:
      - llm-net

    restart: unless-stopped

  vllm:
    image: docker.io/vllm/vllm-openai:latest
    container_name: vllm
    command:
      - /models/gemma-3-270m-it
      - --served-model-name
      - gemma-3-270m-it
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --max-model-len
      - "2048"
      - --max-num-seqs
      - "32"
      - --gpu-memory-utilization
      - "0.80"
      - --enforce-eager
    environment:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    devices:
      - nvidia.com/gpu=all
    security_opt:
      - label=disable
    ipc: host
    volumes:
      - ${LLM_WEIGHTS_DIR}:/models:Z
    networks:
      - llm-net
    restart: unless-stopped

  nginx:
    image: docker.io/library/nginx:latest
    container_name: nginx

    ports:
      - "8001:8001"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,Z
      - ./nginx/tokens.map:/etc/nginx/tokens.map:ro,Z
      - ./nginx/certs:/etc/nginx/certs:ro,Z

    depends_on:
      - vllm

    networks:
      - llm-net

    restart: unless-stopped

  ldap:
    image: docker.io/osixia/openldap:latest
    container_name: ldap
  
    environment:
      LDAP_ORGANISATION: "Company"
      LDAP_DOMAIN: "company.local"
      LDAP_ADMIN_PASSWORD: "adminpassword"
  
    ports:
      - "1389:389"
  
    volumes:
      - ./ldap-data:/var/lib/ldap:Z
      - ./ldap-config:/etc/ldap/slapd.d:Z
  
    networks:
      - llm-net
  
    restart: unless-stopped

networks:
  llm-net:
